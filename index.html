<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewellery shop</title>
    <style>
        header h1 {
            background-color: #383431;
            color: white;
            text-align: center;
            font-size: 2ch;
            font-weight: 100;
        }
        header h2 {
            font-size: 5ch;
            margin: 0%;
        }
        header img {
            height: 1.7ch;
            
        }
        .row {
            display: flex;
            gap: 1%;
        }
        .logo-photo{
            height: 5ch;
        }
        .logo-text{
            height: 5ch;
        }
        .first{
            margin-left: 27%;
        }
        p{
            display: flex;
        }

    </style>
</head>
<body>
    <header>
        <h1>
            𝚁𝙴𝙰𝙻 𝙶𝙾𝙻𝙳 𝙰𝙽𝙳 𝚂𝙸𝙻𝚅𝙴𝚁
        </h1>
        <div class="row">
            <img src="./logo.photo(2).jpg" alt="" class="logo-photo">
            <img src="./logo.png" alt="logo" class="logo-text">
            <p class="first">𝙽𝙴𝚆 𝙰𝚁𝚁𝙸𝚅𝙰𝙻𝚂</p>
            <P>𝙱𝙴𝚂𝚃𝚂𝙴𝙻𝙻𝙴𝚁𝚂</P>
            <P>𝙰𝙻𝙻 𝙹𝙴𝚆𝙴𝙻𝙻𝙴𝚁𝚈</P>
        </div>
    </header>
    
</body>
</html>
